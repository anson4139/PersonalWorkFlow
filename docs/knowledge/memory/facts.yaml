# facts.yaml — Agent Long-Term Memory
# Managed by memory-capture / memory-recall skills.
#
# Schema v2 — adds category, project scope, expires, deprecated flag.
#
# Fields:
#   id          FACT-YYYYMMDD-SEQ
#   category    architecture | decision | pattern | constraint | workflow | env
#   project     _global  OR  projects/<name>
#   claim       The verified finding or decision (one sentence).
#   source
#     type      file | conversation
#     path      workspace-relative path (omit for conversation)
#     evidence  line range or section anchor
#   confidence  low | medium | high
#   created     YYYY-MM-DD
#   updated_at  YYYY-MM-DD
#   expires     YYYY-MM-DD or null (null = never expires)
#   deprecated  false (set true when a fact is superseded, do not delete)
#   tags        list of strings
#
# Example:
#
# - id: FACT-20260427-001
#   category: architecture
#   project: _global
#   claim: "copilot-instructions.md at workspace root is auto-injected into every Copilot session."
#   source:
#     type: file
#     path: .github/copilot-instructions.md
#     evidence: L1-L5
#   confidence: high
#   created: "2026-04-27"
#   updated_at: "2026-04-27"
#   expires: null
#   deprecated: false
#   tags: [framework, copilot, config]

